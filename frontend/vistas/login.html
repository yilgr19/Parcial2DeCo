<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — Productos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="app-page flex min-h-screen flex-col">
    <main
      class="mx-auto flex w-full max-w-md flex-1 flex-col justify-center px-4 py-10"
    >
      <div class="mb-8 text-center">
        <div
          class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-600 text-xl font-bold text-white shadow-lg shadow-indigo-600/25"
          aria-hidden="true"
        >
          T
        </div>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900">
          Tienda
        </h1>
        <p class="mt-1 text-sm text-slate-500">Inicia sesión para ver el catálogo</p>
      </div>

      <form id="formLogin" class="app-card">
        <div class="mb-4">
          <label for="usuario" class="mb-1.5 block text-sm font-medium text-slate-700"
            >Usuario</label
          >
          <input
            id="usuario"
            name="usuario"
            type="text"
            autocomplete="username"
            class="app-input"
            required
          />
        </div>
        <div class="mb-5">
          <label for="password" class="mb-1.5 block text-sm font-medium text-slate-700"
            >Contraseña</label
          >
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            class="app-input"
            required
          />
        </div>
        <p id="msgError" class="app-alert-error mb-4 hidden" role="alert"></p>
        <button type="submit" id="btnEntrar" class="app-btn-primary w-full">
          Iniciar sesión
        </button>
        <div
          id="cargando"
          class="mt-4 hidden text-center text-sm text-slate-500"
        >
          <span class="inline-flex items-center gap-2">
            <span class="app-spinner !h-4 !w-4" aria-hidden="true"></span>
            Cargando…
          </span>
        </div>
      </form>
    </main>

    <footer class="app-footer">
      <p>Desarrollado By Melanny Guate 2026</p>
    </footer>

    <script type="module" src="/src/controladores/login.controlador.js"></script>
  </body>
</html>
