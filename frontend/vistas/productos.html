<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <header
      class="border-b border-slate-200 bg-white px-4 py-3 shadow-sm"
    >
      <div
        class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3"
      >
        <h1 class="text-lg font-semibold text-slate-900">Catálogo de productos</h1>
        <button
          type="button"
          id="btnCerrarSesion"
          class="rounded border border-slate-300 bg-white px-3 py-1.5 text-sm hover:bg-slate-50"
        >
          Cerrar sesión
        </button>
      </div>
    </header>

    <div class="mx-auto max-w-6xl px-4 py-6">
      <p
        id="msgGlobal"
        class="mb-4 hidden rounded border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-900"
      ></p>

      <section
        class="mb-8 rounded-lg border border-slate-200 bg-white p-4 shadow-sm"
      >
        <h2 class="mb-3 text-base font-medium">Agregar producto</h2>
        <form id="formNuevo" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
          <div>
            <label class="mb-1 block text-xs font-medium" for="nNombre"
              >Nombre</label
            >
            <input
              id="nNombre"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
              type="text"
            />
            <p id="errNuevoNombre" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div class="sm:col-span-2">
            <label class="mb-1 block text-xs font-medium" for="nDesc"
              >Descripción</label
            >
            <input
              id="nDesc"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
              type="text"
            />
            <p id="errNuevoDesc" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" for="nSub"
              >Subcategoría</label
            >
            <input
              id="nSub"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
              type="text"
            />
            <p id="errNuevoSub" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" for="nPrecio"
              >Precio</label
            >
            <input
              id="nPrecio"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
              type="number"
              min="0"
              step="any"
            />
            <p id="errNuevoPrecio" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" for="nPxc"
              >Precio x cantidad</label
            >
            <input
              id="nPxc"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
              type="number"
              min="0"
              step="any"
            />
            <p id="errNuevoPxc" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium" for="nEstado"
              >Estado</label
            >
            <select
              id="nEstado"
              class="w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
            >
              <option value="">— elegir —</option>
              <option value="activo">activo</option>
              <option value="inactivo">inactivo</option>
            </select>
            <p id="errNuevoEstado" class="mt-1 text-xs text-red-600"></p>
          </div>
        </form>
        <p id="errNuevoGeneral" class="mt-2 text-sm text-red-600"></p>
        <button
          type="button"
          id="btnCrear"
          class="mt-3 rounded bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50"
        >
          Guardar producto
        </button>
      </section>

      <section
        class="mb-4 rounded-lg border border-slate-200 bg-white p-4 shadow-sm"
      >
        <h2 class="mb-3 text-base font-medium">Filtros y búsqueda</h2>
        <div
          class="flex flex-wrap items-end gap-3"
        >
          <div>
            <label class="mb-1 block text-xs" for="filtroNombre">Nombre (contiene)</label>
            <input
              id="filtroNombre"
              type="text"
              class="w-48 rounded border border-slate-300 px-2 py-1.5 text-sm"
              placeholder="ej: coca"
            />
          </div>
          <div>
            <label class="mb-1 block text-xs" for="filtroSub">Subcategoría</label>
            <select
              id="filtroSub"
              class="w-48 rounded border border-slate-300 px-2 py-1.5 text-sm"
            >
              <option value="">Todas</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="filtroEstado">Estado</label>
            <select
              id="filtroEstado"
              class="w-40 rounded border border-slate-300 px-2 py-1.5 text-sm"
            >
              <option value="">Todos</option>
              <option value="activo">activo</option>
              <option value="inactivo">inactivo</option>
            </select>
          </div>
          <button
            type="button"
            id="btnAplicarFiltros"
            class="rounded bg-slate-700 px-3 py-1.5 text-sm text-white hover:bg-slate-800"
          >
            Aplicar filtros
          </button>
          <button
            type="button"
            id="btnLimpiarFiltros"
            class="rounded border border-slate-300 bg-white px-3 py-1.5 text-sm hover:bg-slate-50"
          >
            Limpiar
          </button>
          <div>
            <label class="mb-1 block text-xs" for="selectLimite">Por página</label>
            <select id="selectLimite" class="rounded border border-slate-300 px-2 py-1.5 text-sm">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </div>
        </div>
      </section>

      <section class="relative rounded-lg border border-slate-200 bg-white shadow-sm">
        <div
          id="cargandoLista"
          class="absolute inset-0 z-10 hidden items-center justify-center rounded-lg bg-white/70"
        >
          <p class="text-sm text-slate-600">Cargando lista…</p>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full min-w-[640px] text-left text-sm">
            <thead class="border-b border-slate-200 bg-slate-50 text-xs uppercase text-slate-600">
              <tr>
                <th class="px-3 py-2">Nombre</th>
                <th class="px-3 py-2">Descripción</th>
                <th class="px-3 py-2">Subcategoría</th>
                <th class="px-3 py-2">Precio</th>
                <th class="px-3 py-2">Px cant.</th>
                <th class="px-3 py-2">Estado</th>
                <th class="px-3 py-2">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaCuerpo"></tbody>
          </table>
        </div>
        <div
          class="flex flex-wrap items-center justify-between gap-2 border-t border-slate-200 px-3 py-2 text-sm"
        >
          <p id="infoPaginacion" class="text-slate-600"></p>
          <div class="flex gap-2">
            <button
              type="button"
              id="btnAnt"
              class="rounded border border-slate-300 px-3 py-1 hover:bg-slate-50 disabled:opacity-40"
            >
              Anterior
            </button>
            <button
              type="button"
              id="btnSig"
              class="rounded border border-slate-300 px-3 py-1 hover:bg-slate-50 disabled:opacity-40"
            >
              Siguiente
            </button>
          </div>
        </div>
      </section>
    </div>

    <div
      id="modalEditar"
      class="fixed inset-0 z-20 hidden items-center justify-center bg-black/40 p-4"
      role="dialog"
      aria-modal="true"
    >
      <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-lg bg-white p-4 shadow-lg">
        <h3 class="mb-3 text-lg font-medium">Editar producto</h3>
        <form id="formEditar" class="grid gap-3">
          <input type="hidden" id="eId" />
          <div>
            <label class="mb-1 block text-xs" for="eNombre">Nombre</label>
            <input id="eNombre" class="w-full rounded border px-2 py-1.5 text-sm" type="text" />
            <p id="errEditNombre" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="eDesc">Descripción</label>
            <input id="eDesc" class="w-full rounded border px-2 py-1.5 text-sm" type="text" />
            <p id="errEditDesc" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="eSub">Subcategoría</label>
            <input id="eSub" class="w-full rounded border px-2 py-1.5 text-sm" type="text" />
            <p id="errEditSub" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="ePrecio">Precio</label>
            <input id="ePrecio" class="w-full rounded border px-2 py-1.5 text-sm" type="number" step="any" min="0" />
            <p id="errEditPrecio" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="ePxc">Precio x cantidad</label>
            <input id="ePxc" class="w-full rounded border px-2 py-1.5 text-sm" type="number" step="any" min="0" />
            <p id="errEditPxc" class="mt-1 text-xs text-red-600"></p>
          </div>
          <div>
            <label class="mb-1 block text-xs" for="eEstado">Estado</label>
            <select id="eEstado" class="w-full rounded border px-2 py-1.5 text-sm">
              <option value="activo">activo</option>
              <option value="inactivo">inactivo</option>
            </select>
            <p id="errEditEstado" class="mt-1 text-xs text-red-600"></p>
          </div>
        </form>
        <p id="errEditGeneral" class="mt-2 text-sm text-red-600"></p>
        <div class="mt-4 flex justify-end gap-2">
          <button type="button" id="btnCancelarEdit" class="rounded border px-3 py-1.5 text-sm">
            Cancelar
          </button>
          <button type="button" id="btnGuardarEdit" class="rounded bg-blue-600 px-3 py-1.5 text-sm text-white hover:bg-blue-700 disabled:opacity-50">
            Guardar cambios
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/controladores/productos.controlador.js"></script>
  </body>
</html>
